<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataShare Agentic AI Chat</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #F9F9F9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 800px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { background: #002060; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center;}
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.5; }
        .user-msg { background: #5b9bd5; color: white; align-self: flex-end; }
        .ai-msg { background: #f1f1f1; color: #333; align-self: flex-start; width: 100%;}
        .graph-container { margin-top: 15px; background: white; border: 1px solid #ddd; border-radius: 5px; padding: 10px; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; background: #fafafa; border-radius: 0 0 10px 10px;}
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background: #002060; color: white; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 5px; cursor: pointer; font-size: 16px;}
        button:hover { background: #003399; }
        select { padding: 10px; margin-right: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2 style="margin: 0;">📊 DataShare Agentic AI Assistant</h2>
        <select id="llm-provider">
            <option value="gpt-4o">OpenAI (GPT-4o)</option>
            <option value="claude-opus-4-5">Claude 4.5 (Opus)</option>
            <option value="claude-opus-4-6">Claude 4.6 (Opus)</option>
            <option value="gemini-3-pro-preview">Gemini 3.5 Pro</option>
            <option value="gemini-3-flash-preview">Gemini 3.5 Fast</option>
            <option value="vllm">Local LLM (vLLM)</option>
            <option value="SGLang">Local LLM (SGLang)</option>
        </select>
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message ai-msg">
            Hello! I'm your Agentic DataShare Assistant. Ask me to pull up indicators like "Show me HTS_TST performance in Nyamira" or "What are the TX_NEW trends?"
        </div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type your data query here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const messageText = inputField.value.trim();
        const provider = document.getElementById("llm-provider").value;
        if (!messageText) return;

        // 1. Add User Message to UI
        appendMessage(messageText, "user-msg");
        inputField.value = "";

        // 2. Add temporary loading indicator
        const loadingId = "load-" + Date.now();
        appendMessage("Thinking and fetching data...", "ai-msg", loadingId);

        // 3. Call the FastAPI backend
        // Inject the Jinja2 variable directly into the string
        const apiUrl = "{{ chat_app_url }}/chat_app/api/chat";
        try {
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: messageText, provider: provider })
            });
            
            const data = await response.json();
            document.getElementById(loadingId).remove();

            // NEW: Catch backend HTTP errors (422, 500, etc.)
            if (!response.ok) {
                const errorMsg = data.detail ? JSON.stringify(data.detail) : "Unknown Server Error";
                appendMessage("❌ Backend Error: " + errorMsg, "ai-msg");
                console.error("Backend Error Data:", data);
                return;
            }

            // 4. Render AI Text and Graph
            renderAIResponse(data.text, data.graph);
            
        } catch (error) {
            if (document.getElementById(loadingId)) {
                document.getElementById(loadingId).innerText = "Error connecting to the AI endpoint.";
            }
            console.error("Fetch/Network Error:", error);
        }
    }

    function appendMessage(text, className, id = null) {
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + className;
        msgDiv.innerText = text;
        if (id) msgDiv.id = id;
        
        const container = document.getElementById("chat-messages");
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function renderAIResponse(text, graphJsonString) {
        const container = document.getElementById("chat-messages");
        
        // Create main wrapper
        const aiWrapper = document.createElement("div");
        aiWrapper.className = "message ai-msg";
        
        // Add text
        const textDiv = document.createElement("div");
        textDiv.innerHTML = text.replace(/\n/g, "<br>"); // simple markdown to br
        aiWrapper.appendChild(textDiv);

        // If graph data exists, render Plotly natively
        if (graphJsonString) {
            const graphContainer = document.createElement("div");
            graphContainer.className = "graph-container";
            const plotDivId = "plot-" + Date.now();
            graphContainer.id = plotDivId;
            aiWrapper.appendChild(graphContainer);
            
            // Append to DOM first so Plotly can find the ID
            container.appendChild(aiWrapper);
            
            const figureData = JSON.parse(graphJsonString);
            Plotly.newPlot(plotDivId, figureData.data, figureData.layout, {responsive: true});
        } else {
            container.appendChild(aiWrapper);
        }
        
        container.scrollTop = container.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
